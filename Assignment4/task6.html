<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <img src="https://media.assettype.com/outlookindia/2024-12-27/0un0pvrl/Picture5.png?w=801&auto=format%2Ccompress&fit=max&format=webp&dpr=1.0"
            alt="Doctor Appoinment" height="200">
    </div>

    <div>
        <h2>Doctor Appointment Form</h2>
        <hr color="red">
    </div>

    <form>
        <div>
            <div>
                <div><label for="appointementDate">Appointment Date</label></div>
                <div><input type="date" id="appointementDate"></div>
            </div>
            <br>

            <div>
                <div><label for="appointmentTime">Appointment Time</label></div>
                <div><input type="time" id="appointmentTime"></div>
            </div>
            <br>

            <div>
                <div><label>Name</label></div>
                <div>
                    <span><input type="text" placeholder="First"></span>
                    <span><input type="text" placeholder="Last"></span>
                </div>
            </div>
            <br>

            <div>
                <div><label>Gender</label></div>
                <div>
                    <span><label for="male">Male</label> <input type="radio" id="male" name="gender"></span>
                    <span><label for="female">Female</label> <input type="radio" id="female" name="gender"></span>
                </div>
            </div>
            <br>

            <div>
                <div><label for="phone">Phone</label></div>
                <div><input type="tel" id="phone" value="###"></div>
            </div>
            <br>

            <div>
                <div><label>Address</label></div>
                <div>
                    <div><input type="text" placeholder="City"></div>
                    <div><input type="text" placeholder="State"></div>
                </div>
            </div>
            <br>

            <div>
                <div><label for="query">Your Query</label></div>
                <div><textarea id="query"></textarea></div>
            </div>
            <br>

            <div>
                <div><label>Appointment Type</label></div>
                <div>
                    <div>Select which appointment type(s) you require:</div>
                    <div><input type="checkbox"> Cervix checkup</div>
                    <div><input type="checkbox"> Heart checkup</div>
                    <div><input type="checkbox"> Eye checkup</div>
                    <div><input type="checkbox"> Hearing test</div>
                </div>
            </div>
            <br>

            <div>
                <button type="submit">Submit</button>
            </div>
        </div>
    </form>
</body>

</html>
