<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <div>
            <h2>Registration form</h2>
        </div>

        <div>
            <span><label>Student Name</label></span>
            <span><input type="text" name="first_name" placeholder="First Name"></span>
            <span><input type="text" name="middle_name" placeholder="Middle Name"></span>
            <span><input type="text" name="last_name" placeholder="Last Name"></span>
        </div>
        <br>

        <div>
            <span><label>Father's name</label></span>
            <span><input type="text" name="father_name" placeholder="Enter your father's name"></span>
            <span><label>Mother's name</label></span>
            <span><input type="text" name="mother_name" placeholder="Enter your mother's name"></span>
        </div>
        <br>

        <div>
            <span><label>Date of birth</label></span>
            <span><input type="date" name="date"></span>
            <span><label>Gender</label></span>
            <span>
                <span>Male <input type="radio" name="gender" value="male"></span>
                <span>Female <input type="radio" name="gender" value="female"></span>
            </span>
        </div>
        <br>

        <div>
            <span><label>Category</label></span>
            <span>
                <span>Gen <input type="radio" name="Category" value="Gen"></span>
                <span>OBC <input type="radio" name="Category" value="OBC"></span>
                <span>SC/ST <input type="radio" name="Category" value="SC/ST"></span>
            </span>
            <span><label>Handicapped</label></span>
            <span>
                <span>Yes <input type="radio" name="Handicapped" value="yes"></span>
                <span>No <input type="radio" name="Handicapped" value="no"></span>
            </span>
        </div>
        <br>

        <div>
            <span><label>Ex-Serviceman</label></span>
            <span>
                <span>Yes <input type="radio" name="Ex-Serviceman" value="yes"></span>
                <span>No <input type="radio" name="Ex-Serviceman" value="No"></span>
            </span>
            <span><label>EWS</label></span>
            <span>
                <span>Yes <input type="radio" name="EWS" value="yes"></span>
                <span>No <input type="radio" name="EWS" value="No"></span>
            </span>
        </div>
        <br>

        <div>
            <span><label>Email ID</label></span>
            <span><input type="email"></span>
            <span><label>Mobile:</label></span>
            <span><input type="number"></span>
        </div>
        <br>

        <div>
            <span><label>State</label></span>
            <span>
                <select name="state">
                    <option value="">Select any one</option>
                    <option value="mp">Madhya Pradesh</option>
                    <option value="jhk">Jharkhand</option>
                    <option value="Del">Delhi</option>
                    <option value="GKJ">Gujrat</option>
                    <option value="bpl">Bihar</option>
                    <option value="Raj">Rajsthan</option>
                    <option value="cgj">chatisgrah</option>
                    <option value="re">Marashthra</option>
                </select>
            </span>
            <span><label>City</label></span>
            <span>
                <select name="city">
                    <option value="">Select Option</option>
                    <option value="bpl">bhopal</option>
                    <option value="idr">indore</option>
                    <option value="jbr">jabalpur</option>
                    <option value="re">Rewa</option>
                </select>
            </span>
        </div>
        <br>

        <div>
            <span><label>Upload Photo</label></span>
            <span><input type="file"></span>
            <span><label>Upload Signature</label></span>
            <span><input type="file"></span>
        </div>
        <br>

        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
